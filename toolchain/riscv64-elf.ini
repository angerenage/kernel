[binaries]
c = 'clang'
c_ld = 'lld'
ar = 'llvm-ar'
strip = 'llvm-strip'

[host_machine]
system = 'none'
cpu_family = 'riscv64'
cpu = 'riscv64'
endian = 'little'

[properties]
needs_exe_wrapper = true
skip_sanity_check = true

[built-in options]
c_args = [
  '--target=riscv64-elf',
  '-ffreestanding',
  '-fno-builtin',
  '-fno-stack-protector',
  '-fno-pic',
  '-fno-omit-frame-pointer',
  '-fno-optimize-sibling-calls',
  '-fno-inline',
  '-g3',
  '-O0']

c_link_args = [
  '--target=riscv64-elf',
  '-nostdlib',
  '-nodefaultlibs',
  '-nostartfiles',
  '-Wl,-m,elf64lriscv',
  '-Wl,--build-id=none']

default_library = 'static'
buildtype = 'debug'
