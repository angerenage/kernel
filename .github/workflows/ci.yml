name: CI

on:
  push:
  pull_request:

jobs:
  build:
    name: Build (${{ matrix.arch }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        arch:
          - x86_64
          - aarch64
          - riscv64
          - loongarch64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            clang \
            lld \
            llvm \
            meson \
            ninja-build \
            pkg-config

      - name: Configure
        run: bash scripts/build.sh --arch "${{ matrix.arch }}" --setup --no-tests

      - name: Compile kernel
        # Only compile the kernel, iso is not generated to save time
        run: meson compile -C "build-${{ matrix.arch }}" kernel

  test:
    name: Native tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            clang \
            lld \
            llvm \
            meson \
            ninja-build \
            pkg-config \
            libcriterion-dev

      - name: Configure x86_64 build
        run: bash scripts/build.sh --arch x86_64 --setup

      - name: Run tests
        run: bash scripts/run.sh --test

  kernel-selftests:
    name: Kernel selftests (${{ matrix.arch }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        arch:
          - x86_64
          - aarch64
          - riscv64
          - loongarch64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        # Set clang-19 as the default clang version because otherwise loongarch64 kernel will fail to compile
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            meson \
            ninja-build \
            pkg-config \
            qemu-system \
            xorriso \
            make \
            automake \
            git \
            mtools \
            clang-19 \
            lld-19 \
            llvm-19 \
            llvm-19-tools

          sudo update-alternatives --install /usr/bin/clang clang /usr/bin/clang-19 100
          sudo update-alternatives --install /usr/bin/clang++ clang++ /usr/bin/clang++-19 100
          sudo update-alternatives --install /usr/bin/ld.lld ld.lld /usr/bin/ld.lld-19 100
          sudo update-alternatives --install /usr/bin/llvm-ar llvm-ar /usr/bin/llvm-ar-19 100
          sudo update-alternatives --install /usr/bin/llvm-ranlib llvm-ranlib /usr/bin/llvm-ranlib-19 100
          sudo update-alternatives --install /usr/bin/llvm-strip llvm-strip /usr/bin/llvm-strip-19 100
          sudo update-alternatives --install /usr/bin/llvm-objcopy llvm-objcopy /usr/bin/llvm-objcopy-19 100
          sudo update-alternatives --install /usr/bin/llvm-objdump llvm-objdump /usr/bin/llvm-objdump-19 100
          sudo update-alternatives --install /usr/bin/llvm-readelf llvm-readelf /usr/bin/llvm-readelf-19 100
          sudo update-alternatives --install /usr/bin/llvm-nm llvm-nm /usr/bin/llvm-nm-19 100

          sudo update-alternatives --set clang /usr/bin/clang-19
          sudo update-alternatives --set clang++ /usr/bin/clang++-19
          sudo update-alternatives --set ld.lld /usr/bin/ld.lld-19
          sudo update-alternatives --set llvm-ar /usr/bin/llvm-ar-19
          sudo update-alternatives --set llvm-ranlib /usr/bin/llvm-ranlib-19
          sudo update-alternatives --set llvm-strip /usr/bin/llvm-strip-19
          sudo update-alternatives --set llvm-objcopy /usr/bin/llvm-objcopy-19
          sudo update-alternatives --set llvm-objdump /usr/bin/llvm-objdump-19
          sudo update-alternatives --set llvm-readelf /usr/bin/llvm-readelf-19
          sudo update-alternatives --set llvm-nm /usr/bin/llvm-nm-19

          if [ "${{ matrix.arch }}" = "x86_64" ]; then
            sudo apt-get install -y nasm
          elif [ "${{ matrix.arch }}" = "riscv64" ]; then
            sudo apt-get install -y qemu-efi-riscv64
          fi

      - name: Build selftest image
        run: |
          bash scripts/build.sh \
            --arch "${{ matrix.arch }}" \
            --setup \
            --compile \
            --no-tests \
            --kernel-selftests \
            --kernel-selftests-autorun

      - name: Run in-kernel selftests
        run: bash scripts/run.sh --kernel-selftest --arch "${{ matrix.arch }}" --timeout 45
